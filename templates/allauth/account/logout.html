{% extends "allauth/account/base.html" %}
{% load i18n %}

{% block head_title %}{% trans "Sign Out" %}{% endblock %}

{% block inner_content %}
<hr>
<h2 class="logo-font mb-4">{% trans "Sign Out" %}</h2>
<hr>

<p>{% trans "Are you sure you want to sign out?" %}</p>

<form method="POST" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <button class="btn btn-black rounded-0 text-uppercase" type="submit">
        {% trans "Sign Out" %}
    </button>
</form>

<a class="btn btn-outline-black rounded-0 text-uppercase mt-2" href="{% url 'home' %}">
    Home
</a>
{% endblock %}
